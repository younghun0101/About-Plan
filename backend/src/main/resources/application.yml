spring:
  application:
    name: about-plan-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/about_plan}
    username: ${DB_USERNAME:about_plan}
    password: ${DB_PASSWORD:about_plan}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:about-plan-dev-secret-key-change-this-in-production-32chars}
    access-token-exp-minutes: ${JWT_ACCESS_TOKEN_EXP_MINUTES:720}
