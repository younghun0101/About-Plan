services:
  postgres:
    image: postgres:16-alpine
    container_name: about-plan-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: about_plan
      POSTGRES_USER: about_plan
      POSTGRES_PASSWORD: about_plan
    volumes:
      - about_plan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U about_plan -d about_plan"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  about_plan_pgdata:
